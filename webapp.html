:root{
  --bg:#F6F4F0;--dark:#1A1A1E;--gold:#C9A55A;--gold2:#8B6914;
  --card:#FFF;--text:#1A1A1E;--muted:#8E8E93;--border:#E5DFD3;
  --green:#2E7D52;--red:#C0392B;--shadow:0 2px 18px rgba(0,0,0,0.07);
  --premium:#4A3728;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Jost',sans-serif;color:var(--text);padding-bottom:140px}

/* HEADER */
.hdr{background:var(--dark);padding:13px 15px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.hlogo{height:36px;border-radius:6px;object-fit:contain}
.hinfo h1{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2}
.hinfo p{font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.hbadge{margin-left:auto;background:var(--gold);color:var(--dark);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:700;display:none;cursor:pointer}
.hbadge.show{display:block}

.sheets-status{text-align:center;font-size:11px;padding:5px 14px;color:var(--muted)}
.sheets-status.ok{color:var(--green)}
.sheets-status.err{color:var(--red)}

/* SVITCH */
.sw-wrap{margin:10px 13px 0;background:var(--dark);border-radius:14px;padding:4px;display:flex;gap:2px}
.sw-btn{flex:1;padding:10px 6px;border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;background:transparent;color:#999;line-height:1.3}
.sw-btn.active{background:var(--gold);color:var(--dark)}
.sw-note{text-align:center;font-size:11px;color:var(--muted);margin:5px 13px 2px}

/* KATEGORIYA */
.cats{display:flex;gap:5px;padding:10px 12px 4px;overflow-x:auto;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s}
.cat.active{background:var(--dark);border-color:var(--dark);color:#fff}

/* SECTION */
.sec-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--dark);padding:10px 13px 4px;display:flex;align-items:center;gap:6px}
.products{padding:4px 11px;display:flex;flex-direction:column;gap:9px}

/* CARD */
.card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;animation:up 0.28s ease both}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ctop{display:flex}
.cimg{width:106px;height:106px;object-fit:cover;flex-shrink:0;background:var(--bg);cursor:pointer;transition:opacity 0.15s}
.cimg:active{opacity:0.8}
.cimg-ph{width:106px;height:106px;flex-shrink:0;background:linear-gradient(135deg,#EAE2D4,#D6CAB5);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
.cinfo{flex:1;padding:10px 11px 8px;display:flex;flex-direction:column;gap:4px}
.cname{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;line-height:1.3;color:var(--dark)}

/* RAZMER TUGMALAR */
.rrow{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.rbtn{padding:3px 9px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s}
.rbtn.active{background:var(--dark);border-color:var(--dark);color:#fff}

/* ROM TABS */
.rtabs{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.rtab{padding:4px 9px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s}
.rtab.active{background:var(--premium);border-color:var(--premium);color:#fff}
.rom-param{background:linear-gradient(135deg,#F2EBE0,#FAF5EC);border-radius:8px;padding:7px 10px;font-size:10px;color:var(--gold2);line-height:1.6;margin-top:4px;display:none}
.rom-param.show{display:block}

.price-row{display:flex;align-items:baseline;gap:5px;margin-top:4px}
.pmain{font-size:15px;font-weight:700;color:var(--gold2)}
.pold{font-size:11px;color:var(--muted);text-decoration:line-through}
.punit{font-size:10px;color:var(--muted)}

.qinp{flex:1;height:36px;border:1.5px solid var(--border);border-radius:8px;padding:0 9px;font-family:'Jost',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s}

.abtn:active{transform:scale(0.96)}

// Sheets dan yuklab olish
async function loadSheetsNarx() {
  const el = document.getElementById('sheets-status');
  el.style.display = 'block';
  el.textContent = '⏳ Narxlar yuklanmoqda...';
  el.className = 'sheets-status';

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&t=${Date.now()}`;
    
    // Promise.race — 5 soniyada javob kelmasa xatoga o'tadi
    const res = await Promise.race([
      fetch(url, { mode: 'cors', cache: 'no-cache' }),
      new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
    ]);

    if (!res.ok) throw new Error('HTTP ' + res.status);
    
    const text = await res.text();
    if (!text || text.includes('<!DOCTYPE')) throw new Error('HTML keldi, CSV emas');

    let found = 0;
    text.split('\n').forEach(line => {
      const parts = line.split(',');
      if (parts.length >= 2) {
        const key = parts[0].trim().replace(/"/g, '').trim();
        const val = parseInt(parts[1].trim().replace(/"/g, '').replace(/\s/g, ''));
        if (key && !isNaN(val) && val > 0) {
          sheetsNarx[key] = val;
          found++;
        }
      }
    });

    if (found === 0) throw new Error('Narxlar topilmadi');

    el.textContent = `✅ ${found} ta narx yuklandi`;
    el.className = 'sheets-status ok';
    console.log('Sheets narxlar:', sheetsNarx);
    setTimeout(() => el.style.display = 'none', 2000);

  } catch(e) {
    console.warn('Sheets xato:', e.message, '— zaxira narxlar ishlatiladi');
    el.textContent = '⚡ Zaxira narxlar ishlatilmoqda';
    el.className = 'sheets-status err';
    setTimeout(() => el.style.display = 'none', 2000);
  }
}

function setKalvakTur(v){ kalvakTur=v; calcKalvak(); }

function calcKalvak() {
  const h=parseFloat(document.getElementById('kal-h').value)||0;
  const w=parseFloat(document.getElementById('kal-w').value)||0;
  const t=parseFloat(document.getElementById('kal-t').value)||0;

  const el=document.getElementById('kal-res');
  if(!h||!w||!t||!s){el.textContent="O'lchamlarni kiriting";return;}
  const kubm=(h*w*t)/1000000;
  const bazaKey = kalvakTur==='kalvak'?'Kalvak kub metr baza':'Barelyef kub metr baza';
  const bazaNarx = sheetsNarx[bazaKey]||(kalvakTur==='kalvak'?4000000:5000000);
  const koef = parseFloat(kalvakMurakkab)||1.2;
  const narx = kubm * bazaNarx * koef * s;
  const tur = kalvakTur==='kalvak'?'Kalvak':'Barelyef';
  el.textContent=`${tur} narxi: ${fmt(narx)}`;
}
function addKalvak() {
  const h=parseFloat(document.getElementById('kal-h').value)||0;
  const w=parseFloat(document.getElementById('kal-w').value)||0;
  const t=parseFloat(document.getElementById('kal-t').value)||0;
  const s=parseFloat(document.getElementById('kal-s').value)||0;
  if(!h||!w||!t||!s) return;
  const kubm=(h*w*t)/1000000;
  const bazaKey=kalvakTur==='kalvak'?'Kalvak kub metr baza':'Barelyef kub metr baza';
  const bazaNarx=sheetsNarx[bazaKey]||(kalvakTur==='kalvak'?4000000:5000000);
  const koef=parseFloat(kalvakMurakkab)||1.2;
  const narx=kubm*bazaNarx*koef*s;
  const murakkabNom=kalvakMurakkab==='1.2'?'Oddiy':kalvakMurakkab==='1.5'?"O'rtacha murakkab":"Juda murakkab";
  const tur=kalvakTur==='kalvak'?'Kalvak':'Barelyef';
  const razmer=`${h}×${w}×${t}sm, ${s} dona, ${murakkabNom}`;
  upsertSavat('kalvak_'+Date.now(),tur,razmer,'dona',narx,1,'nostandart');
  setBtnAdded('kal-add');
}

// ===== SAVAT YORDAMCHI =====
function upsertSavat(id,name,razmer,unit,price,qty,cat) {
  const ex=savat.findIndex(s=>s.id===id);
  const jami=Math.round(price*qty);
  if(ex>=0) savat[ex]={id,name,razmer,unit,price:Math.round(price),qty,jami,cat};
  else savat.push({id,name,razmer,unit,price:Math.round(price),qty,jami,cat});
  updateUI();
}
function removeFromCart(id) {
  savat=savat.filter(s=>s.id!==id);
  updateUI(); renderCartItems();
  renderContent(currentCat);
}
function updateUI() {
  const total=savat.reduce((s,i)=>s+i.jami,0);
  const count=savat.length;
  document.getElementById('hbadge').textContent='🛒 '+count;
  document.getElementById('hbadge').classList.toggle('show',count>0);
  document.getElementById('cfab').classList.toggle('show',count>0);
  document.getElementById('fabTxt').textContent=count+' ta — '+fmt(total);
  if(count>0){
    tg.MainButton.setText('✅ Buyurtmani tasdiqlash — '+fmt(total));
    tg.MainButton.show();
  } else tg.MainButton.hide();
  renderCartItems();
}
function renderCartItems() {
  const c=document.getElementById('citems');
  const t=document.getElementById('ctotal');
  if(!savat.length){
    c.innerHTML="<p style='text-align:center;color:#8E8E93;padding:20px 0;font-size:13px'>Savat bo'sh</p>";
    t.style.display='none'; return;
  }
  const total=savat.reduce((s,i)=>s+i.jami,0);
  c.innerHTML=savat.map(item=>`<div class="ci">
    <div class="ci-info">
      <div class="ci-name">${item.name}</div>
      <div class="ci-det">📏 ${item.razmer}<br>💰 ${item.qty} ${item.unit} × ${fmt(item.price)}</div>
    </div>
    <div class="ci-price">${fmt(item.jami)}</div>
    <button class="cdel" onclick="removeFromCart('${item.id}')">✕</button>
  </div>`).join('');
  document.getElementById('totalTxt').textContent=fmt(total);
  t.style.display='flex';
}

function shakeInp(id){
  const el=document.getElementById(id);if(!el)return;
  el.style.borderColor='#C0392B';el.focus();
  setTimeout(()=>el.style.borderColor='',1200);
}
function setBtnAdded(id){
  const btn=document.getElementById(id);if(!btn)return;
  const was=btn.textContent;btn.textContent='✓ Savatda';btn.classList.add('added');
  setTimeout(()=>{if(btn.classList.contains('added')&&btn.textContent!=="✓ Savatda")return;},3000);
}
function openImg(src){document.getElementById('imgBig').src=src;document.getElementById('imgOv').classList.add('show');}
function closeImg(){document.getElementById('imgOv').classList.remove('show');}
function openCart(){document.getElementById('cpanel').classList.add('open');document.getElementById('ov').classList.add('show');}
function closeCart(){document.getElementById('cpanel').classList.remove('open');document.getElementById('ov').classList.remove('show');}
function filterCat(cat,btn){
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderContent(cat);
}

// Telegram Main Button
tg.MainButton.onClick(()=>{
  const total=savat.reduce((s,i)=>s+i.jami,0);
  const data={
    savat: savat.map(i=>({
      mahsulot: i.name,
      razmer: i.razmer,
      miqdor: i.qty+' '+i.unit,
      birlik_narx: i.price,
      jami: i.jami
    })),
    jami_summa: Math.round(total),
    qoplama_holati: qoplamali ? 'Qoplamali' : 'Qoplamasiz'
  };
  tg.sendData(JSON.stringify(data));
});
