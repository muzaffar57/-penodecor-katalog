<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PenoDecorPro - Rom Bezaklari Katalogi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8f9fa; font-family: Arial, sans-serif; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-size: 24px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; height: 180px; object-fit: contain; border-radius: 5px; background: #f0f0f0; }
        .card h3 { margin-top: 10px; color: #2c3e50; font-size: 14px; }

        /* Lightbox */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 85vh; object-fit: contain; border-radius: 10px; }
        .lightbox-title { position: absolute; bottom: 20px; color: white; font-size: 20px; font-weight: bold; }
        .lightbox-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 36px; cursor: pointer; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <h1>Rom Bezaklari Katalogi</h1>
    <div class="grid">
        <div class="card" onclick="openLightbox('01.jpg', 'MODEL-01')"><img src="01.jpg" alt="MODEL-01"><h3>MODEL-01</h3></div>
        <div class="card" onclick="openLightbox('02.jpg', 'MODEL-02')"><img src="02.jpg" alt="MODEL-02"><h3>MODEL-02</h3></div>
        <div class="card" onclick="openLightbox('03.jpg', 'MODEL-03')"><img src="03.jpg" alt="MODEL-03"><h3>MODEL-03</h3></div>
        <div class="card" onclick="openLightbox('04.jpg', 'MODEL-04')"><img src="04.jpg" alt="MODEL-04"><h3>MODEL-04</h3></div>
        <div class="card" onclick="openLightbox('05.jpg', 'MODEL-05')"><img src="05.jpg" alt="MODEL-05"><h3>MODEL-05</h3></div>
        <div class="card" onclick="openLightbox('06.jpg', 'MODEL-06')"><img src="06.jpg" alt="MODEL-06"><h3>MODEL-06</h3></div>
        <div class="card" onclick="openLightbox('07.jpg', 'MODEL-07')"><img src="07.jpg" alt="MODEL-07"><h3>MODEL-07</h3></div>
        <div class="card" onclick="openLightbox('08.jpg', 'MODEL-08')"><img src="08.jpg" alt="MODEL-08"><h3>MODEL-08</h3></div>
        <div class="card" onclick="openLightbox('09.jpg', 'MODEL-09')"><img src="09.jpg" alt="MODEL-09"><h3>MODEL-09</h3></div>
        <div class="card" onclick="openLightbox('10.jpg', 'MODEL-10')"><img src="10.jpg" alt="MODEL-10"><h3>MODEL-10</h3></div>
        <div class="card" onclick="openLightbox('11.jpg', 'MODEL-11')"><img src="11.jpg" alt="MODEL-11"><h3>MODEL-11</h3></div>
        <div class="card" onclick="openLightbox('12.jpg', 'MODEL-12')"><img src="12.jpg" alt="MODEL-12"><h3>MODEL-12</h3></div>
        <div class="card" onclick="openLightbox('13.jpg', 'MODEL-13')"><img src="13.jpg" alt="MODEL-13"><h3>MODEL-13</h3></div>
        <div class="card" onclick="openLightbox('14.jpg', 'MODEL-14')"><img src="14.jpg" alt="MODEL-14"><h3>MODEL-14</h3></div>
        <div class="card" onclick="openLightbox('15.jpg', 'MODEL-15')"><img src="15.jpg" alt="MODEL-15"><h3>MODEL-15</h3></div>
        <div class="card" onclick="openLightbox('16.jpg', 'MODEL-16')"><img src="16.jpg" alt="MODEL-16"><h3>MODEL-16</h3></div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-title" id="lightbox-title"></div>
    </div>

    <script>
        function openLightbox(src, title) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-title').textContent = title;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
    </script>
</body>
</html>
